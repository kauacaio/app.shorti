<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Shorti">
  <title>Shorti — Entrar</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:   #1B44B8;
      --blue-h: #1538A0;
      --blue-l: #EFF4FF;
      --blue-g: rgba(27,68,184,.12);
      --ok:     #10B981;
      --err:    #EF4444;
      --tx:     #0F172A;
      --tx-m:   #64748B;
      --tx-s:   #94A3B8;
      --bd:     #E2E8F0;
      --bd-s:   #CBD5E1;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #fff;
      color: var(--tx);
      overflow: hidden;
    }

    input::-webkit-contacts-auto-fill-button,
    input::-webkit-credentials-auto-fill-button { visibility: hidden; width: 0; pointer-events: none; }

    /* ════ LAYOUT ════════════════════════════════════ */
    .page { display: grid; grid-template-columns: 1.1fr .9fr; height: 100vh; }

    /* ════ LEFT ══════════════════════════════════════ */
    .brand {
      position: relative;
      background: #F8FAFC;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 72px 80px;
      overflow: hidden;
    }

    /* single large circle — only decoration */
    .brand::after {
      content: '';
      position: absolute;
      width: 520px; height: 520px;
      border-radius: 50%;
      border: 1px solid rgba(27,68,184,.08);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(.92);
      pointer-events: none;
      opacity: 0;
      animation: ringIn 1.2s cubic-bezier(.16,1,.3,1) .05s forwards;
    }
    /* second ring */
    .brand-ring {
      position: absolute;
      width: 340px; height: 340px;
      border-radius: 50%;
      border: 1px solid rgba(27,68,184,.06);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(.92);
      pointer-events: none;
      opacity: 0;
      animation: ringIn 1.2s cubic-bezier(.16,1,.3,1) .12s forwards;
    }
    @keyframes ringIn {
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* orbiting hollow shapes */
    .brand-orbit {
      position: absolute;
      width: 0; height: 0;
      top: 50%; left: 50%;
      pointer-events: none;
      opacity: 0;
      animation: orbitSpin 35s linear infinite, fadeIn 1.4s ease .3s forwards;
    }
    @keyframes orbitSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .orbit-item { position: absolute; top: 0; left: 0; }
    .orbit-counter {
      position: absolute;
      animation: orbitCounter 35s linear infinite;
    }
    @keyframes orbitCounter {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to   { transform: translate(-50%,-50%) rotate(-360deg); }
    }
    .orbit-float {
      display: block;
      animation: orbitFloat 1.8s ease-in-out infinite alternate;
    }
    @keyframes orbitFloat {
      from { transform: translateY(-5px); }
      to   { transform: translateY(5px); }
    }
    /* organic, subtle color drift across the brand palette (blue ↔ violet) */
    @keyframes hueDrift {
      0%, 100% { filter: hue-rotate(0deg); }
      50%      { filter: hue-rotate(36deg); }
    }
    .shape { display: block; }
    .shape-diamond { border: 1.5px solid rgba(27,68,184,.16); border-radius: 4px; transform: rotate(45deg); animation: hueDrift 9s ease-in-out infinite; }
    .shape-diamond.shape-lg { width: 24px; height: 24px; }
    .shape-diamond.shape-sm { width: 14px; height: 14px; animation-delay: -4.5s; }
    .shape-circle { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid rgba(124,58,237,.16); animation: hueDrift 11s ease-in-out infinite; animation-delay: -3s; }
    .shape-square { width: 18px; height: 18px; border: 1.5px solid rgba(27,68,184,.13); border-radius: 3px; animation: hueDrift 13s ease-in-out infinite; animation-delay: -7s; }
    .shape-tri svg { display: block; animation: hueDrift 10s ease-in-out infinite; animation-delay: -1.5s; }

    /* giant translucent wordmark, peeking in at the bottom */
    .brand-watermark {
      position: absolute; inset: 0;
      display: flex; align-items: flex-end; justify-content: center;
      overflow: hidden; pointer-events: none; z-index: 0;
    }
    .brand-watermark {
      opacity: 0;
      animation: fadeIn 1.6s ease .15s forwards;
    }
    .brand-watermark span {
      font-size: clamp(260px, 42vw, 640px);
      font-weight: 900;
      letter-spacing: -.05em;
      line-height: 1;
      color: rgba(27,68,184,.035);
      white-space: nowrap;
      user-select: none;
      transform: translateY(55%);
    }

    /* dot grid */
    .brand-grid {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(27,68,184,.09) 1px, transparent 1px);
      background-size: 28px 28px;
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 45% 50%, black 5%, transparent 100%);
      mask-image: radial-gradient(ellipse 80% 80% at 45% 50%, black 5%, transparent 100%);
      opacity: 0;
      animation: fadeIn 1.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* brand content */
    .b-inner { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }

    .eyebrow {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 10px; font-weight: 600;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--tx-s); margin-bottom: 24px;
      opacity: 0; animation: fadeUp .5s ease .05s forwards;
    }
    .e-bars { display: flex; align-items: flex-end; gap: 2px; }
    .e-bar  {
      background: var(--tx-s); border-radius: 1.5px; transform: skewX(-14deg);
    }
    .e-bar:nth-child(1) { width: 3px; height: 8px; opacity: .5; }
    .e-bar:nth-child(2) { width: 3.5px; height: 11px; opacity: .8; }

    /* wordmark */
    .wm-row {
      display: flex; align-items: flex-end; gap: .18em;
      font-size: clamp(84px, 11.5vw, 134px);
      margin-bottom: 28px;
    }
    .wm-bars { display: flex; align-items: flex-end; gap: .09em; height: .75em; }
    .wm-bars span {
      display: block; border-radius: .07em; transform-origin: bottom;
      opacity: 0;
      animation: barpop .7s cubic-bezier(.34,1.56,.64,1) both;
    }
    .wm-bars span:nth-child(1) { width: .16em; height: .46em; background: rgba(100,116,139,.28); animation-delay: 0s; }
    .wm-bars span:nth-child(2) { width: .2em; height: .75em; background: linear-gradient(180deg, #94A3B8 0%, #475569 100%); animation-delay: .08s; }
    @keyframes barpop {
      from { opacity: 0; transform: scaleY(0) skewX(-14deg); }
      to   { opacity: 1; transform: scaleY(1) skewX(-14deg); }
    }
    .wm {
      display: block;
      font-size: 1em;
      font-weight: 900;
      letter-spacing: -.055em;
      line-height: .75em;
      color: var(--tx);
      white-space: nowrap;
      user-select: none;
    }
    .wl {
      display: inline-block;
      opacity: 0;
      animation: lpop .65s cubic-bezier(.34,1.56,.64,1) both;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      cursor: default;
    }
    .wl-dot {
      background: linear-gradient(135deg, var(--blue) 0%, #7C3AED 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: lpop .65s cubic-bezier(.34,1.56,.64,1) .48s both,
                  dotGlow 2.6s ease-in-out 1.3s infinite;
    }
    @keyframes dotGlow {
      0%, 100% { filter: drop-shadow(0 0 0 rgba(124,58,237,0)); }
      50%      { filter: drop-shadow(0 0 7px rgba(124,58,237,.4)); }
    }
    .wl:nth-child(1){animation-delay:.06s} .wl:nth-child(2){animation-delay:.12s}
    .wl:nth-child(3){animation-delay:.18s} .wl:nth-child(4){animation-delay:.24s}
    .wl:nth-child(5){animation-delay:.30s} .wl:nth-child(6){animation-delay:.36s}
    @keyframes lpop { to { opacity: 1; transform: none; } }

    .brand-line {
      width: 48px; height: 2px;
      margin: 0 auto;
      background: linear-gradient(90deg, var(--blue) 0%, rgba(27,68,184,.2) 100%);
      border-radius: 2px;
      opacity: 0; animation: fadeUp .5s ease .52s forwards;
    }

    /* tagline — letters fade in sequentially */
    .b-tagline {
      margin: 18px auto 0;
      font-size: 15px; line-height: 1.6; text-align: center;
      color: var(--tx-m); max-width: 360px;
    }
    .b-tagline .bl {
      display: inline-block;
      opacity: 0;
      animation: charIn .5s ease forwards;
    }
    @keyframes charIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    /* ════ RIGHT ═════════════════════════════════════ */
    .form-side {
      background: #fff;
      border-left: 1px solid #F1F5F9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%; max-width: 340px;
      opacity: 0; animation: cardIn .7s cubic-bezier(.16,1,.3,1) .22s forwards;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

    .c-title {
      font-size: 21px; font-weight: 700;
      letter-spacing: -.03em; color: var(--tx);
      margin-bottom: 4px;
    }
    .c-sub {
      font-size: 13px; color: var(--tx-m);
      line-height: 1.5; margin-bottom: 28px;
    }

    /* ── Fields ─────────────────────────────────────── */
    .field { position: relative; margin-bottom: 12px; }

    .field input {
      width: 100%;
      height: 52px;
      background: #fff;
      border: 1.5px solid var(--bd);
      border-radius: 10px;
      padding: 18px 44px 6px 14px;
      font-size: 14.5px;
      font-family: 'Inter', sans-serif;
      color: var(--tx);
      outline: none;
      caret-color: var(--blue);
      transition: border-color .16s, box-shadow .16s;
      appearance: none; -webkit-appearance: none;
    }
    .field input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(27,68,184,.08);
    }

    .field label {
      position: absolute;
      left: 14px;
      top: 50%; transform: translateY(-50%);
      font-size: 14px; color: var(--tx-s);
      pointer-events: none;
      transition: top .18s ease, transform .18s ease, font-size .18s ease, color .18s ease, letter-spacing .18s ease;
    }
    .field input:focus ~ label,
    .field input.v ~ label {
      top: 9px; transform: none;
      font-size: 10px; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--blue);
    }

    /* right icon slot */
    .fr {
      position: absolute; right: 12px;
      top: 50%; transform: translateY(-50%);
      display: flex; align-items: center;
    }
    .fbtn {
      background: none; border: none; cursor: pointer;
      color: var(--tx-s); padding: 4px; border-radius: 6px;
      display: flex; align-items: center;
      transition: color .14s;
    }
    .fbtn:hover { color: var(--tx-m); }
    .fchk { display: none; color: var(--ok); }
    .fchk.on { display: flex; animation: popIn .25s cubic-bezier(.34,1.56,.64,1); }
    @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }

    /* ring ripple — subtle, monochrome */
    .ring {
      position: absolute; inset: -2px; border-radius: 12px;
      border: 1px solid var(--blue);
      animation: ringOut .5s ease-out forwards;
      pointer-events: none; z-index: 4;
    }
    @keyframes ringOut { 0%{opacity:.4;transform:scale(1)} 100%{opacity:0;transform:scale(1.04)} }

    /* strength bar */
    .str-bar { height: 2px; background: var(--bd); border-radius: 1px; margin-top: 6px; overflow: hidden; }
    .str-fill { height: 100%; border-radius: 1px; width: 0; background: var(--blue); transition: width .4s cubic-bezier(.16,1,.3,1), opacity .3s; opacity: 0; }

    /* error */
    .field.e input { border-color: var(--err); box-shadow: 0 0 0 3px rgba(239,68,68,.08); animation: shk .4s both; }
    .field.e label { color: var(--err) !important; }
    .fmsg { font-size: 11.5px; color: var(--err); margin-top: 4px; margin-left: 2px; display: none; }
    .field.e .fmsg { display: block; animation: fadeUp .18s ease; }
    @keyframes shk { 0%,100%{transform:none} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }

    /* forgot */
    .forgot { text-align: right; margin-bottom: 20px; }
    .forgot a { font-size: 12px; color: var(--tx-m); text-decoration: none; transition: color .14s; }
    .forgot a:hover { color: var(--blue); }

    /* submit */
    .btn {
      width: 100%; height: 46px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 10px;
      font-size: 14.5px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer; position: relative; overflow: hidden;
      box-shadow: 0 2px 12px rgba(27,68,184,.22);
      transition: background .16s, box-shadow .16s, transform .12s;
      letter-spacing: -.01em;
    }
    .btn:hover:not(:disabled) {
      background: var(--blue-h);
      box-shadow: 0 6px 22px rgba(27,68,184,.30);
      transform: translateY(-1px);
    }
    .btn:active:not(:disabled) { transform: scale(.99); }
    .btn:disabled { opacity: .7; cursor: not-allowed; transform: none !important; }
    .btn::before {
      content: ''; position: absolute;
      top: 0; bottom: 0; left: -100%; width: 60%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
      transform: skewX(-18deg);
      transition: left .5s ease;
    }
    .btn:hover::before { left: 160%; }
    .bi { display:flex; align-items:center; justify-content:center; gap:8px; position:relative; z-index:1; }
    .sp { display:none; width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
    .btn.ld .lbl{display:none} .btn.ld .sp{display:block}

    .alert {
      display:none; margin-top:12px;
      padding:10px 14px;
      background:#FEF2F2; border:1px solid #FECACA;
      border-radius:8px; font-size:12.5px; color:#B91C1C;
      animation:fadeUp .2s ease;
    }

    /* divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--tx-s); font-size: 12px;
    }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--bd); }

    /* demo / test account */
    .btn-demo {
      width: 100%; height: 46px;
      background: #fff; color: var(--blue);
      border: 1.5px solid var(--blue-l);
      border-radius: 10px;
      font-size: 14px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      letter-spacing: -.01em;
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .14s, border-color .14s, transform .12s;
    }
    .btn-demo:hover {
      background: var(--blue-l);
      border-color: var(--blue);
      transform: translateY(-1px);
    }
    .btn-demo:active { transform: scale(.99); }
    .demo-note {
      margin-top: 10px; text-align: center;
      font-size: 11.5px; color: var(--tx-s);
    }

    /* footer */
    .footer { margin-top: 22px; text-align: center; }
    .gl {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 11px; color: var(--tx-s);
      text-decoration: none; padding: 5px 10px;
      border-radius: 20px; transition: background .14s, color .14s;
    }
    .gl:hover { background: #F8FAFC; color: var(--tx-m); }
    .gbs { display:flex; align-items:flex-end; gap:2px; }
    .gb  { background:var(--blue); border-radius:1.5px; transform:skewX(-14deg); }
    .gb:nth-child(1){width:3px;height:8px;opacity:.5} .gb:nth-child(2){width:3.5px;height:11px}
    .gnm { font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--blue); font-size:10px; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    @keyframes spin   { to{transform:rotate(360deg)} }

    /* responsive */
    @media (max-width: 860px) {
      html, body { overflow: auto; }
      .page { grid-template-columns: 1fr; height: auto; }
      .brand { padding: 40px 28px 32px; min-height: auto; justify-content: center; }
      .brand::after { width: 320px; height: 320px; }
      .brand-ring { width: 220px; height: 220px; }
      .brand-watermark, .brand-orbit { display: none; }
      .wm-row { font-size: clamp(56px,17vw,84px); transform: translateX(-.315em); margin-bottom: 18px; }
      .eyebrow { margin-bottom: 16px; }
      .form-side { padding: 40px 24px 48px; border-left: none; border-top: 1px solid #F1F5F9; }
      .card { max-width: 400px; }
    }
    @media (max-width: 480px) {
      .brand { padding: 32px 20px 28px; }
      .brand::after { width: 260px; height: 260px; }
      .brand-ring { width: 180px; height: 180px; }
      .wm-row { font-size: 52px; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- ═══ LEFT ═══ -->
  <div class="brand">
    <div class="brand-grid"></div>
    <div class="brand-ring"></div>
    <div class="brand-watermark"><span>Shorti</span></div>

    <div class="brand-orbit">
      <div class="orbit-item" style="transform:translate(244px,89px)">
        <div class="orbit-counter"><div class="orbit-float" style="animation-duration:1.6s"><div class="shape shape-diamond shape-lg"></div></div></div>
      </div>
      <div class="orbit-item" style="transform:translate(-130px,109px)">
        <div class="orbit-counter"><div class="orbit-float" style="animation-duration:2s; animation-delay:.2s"><div class="shape shape-circle"></div></div></div>
      </div>
      <div class="orbit-item" style="transform:translate(-236px,-110px)">
        <div class="orbit-counter"><div class="orbit-float" style="animation-duration:1.8s; animation-delay:.55s"><div class="shape shape-square"></div></div></div>
      </div>
      <div class="orbit-item" style="transform:translate(85px,-147px)">
        <div class="orbit-counter">
          <div class="orbit-float" style="animation-duration:2.2s; animation-delay:.35s">
            <div class="shape shape-tri">
              <svg width="22" height="20" viewBox="0 0 22 20" fill="none"><polygon points="11,1 21,19 1,19" stroke="rgba(27,68,184,.18)" stroke-width="1.5"/></svg>
            </div>
          </div>
        </div>
      </div>
      <div class="orbit-item" style="transform:translate(-45px,256px)">
        <div class="orbit-counter"><div class="orbit-float" style="animation-duration:1.9s; animation-delay:.8s"><div class="shape shape-diamond shape-sm"></div></div></div>
      </div>
    </div>

    <div class="b-inner">
      <div class="eyebrow">
        <div class="e-bars"><div class="e-bar"></div><div class="e-bar"></div></div>
        ERP · GrupoLima
      </div>

      <div class="wm-row">
        <div class="wm-bars"><span></span><span></span></div>
        <div class="wm" id="wm" aria-label="Shorti.">
          <span class="wl">S</span><span
          class="wl">h</span><span
          class="wl">o</span><span
          class="wl">r</span><span
          class="wl">t</span><span
          class="wl">i</span><span
          class="wl wl-dot">.</span>
        </div>
      </div>

      <div class="brand-line"></div>
      <p class="b-tagline" id="btag">Vendas, estoque e clientes em um só lugar.</p>
    </div>
  </div>

  <!-- ═══ RIGHT ═══ -->
  <div class="form-side">
    <div class="card">

      <h2 class="c-title">Acesse sua conta</h2>
      <p class="c-sub">Entre com suas credenciais para continuar.</p>

      <form id="lf" novalidate>

        <div class="field" id="f-em">
          <input type="email" id="em" placeholder=" " autocomplete="email" inputmode="email">
          <label for="em">E-mail</label>
          <div class="fr">
            <span class="fchk" id="emok">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2.5 7l3 3L11.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>
          <p class="fmsg">E-mail inválido.</p>
        </div>

        <div class="field" id="f-pw">
          <input type="password" id="pw" placeholder=" " autocomplete="current-password">
          <label for="pw">Senha</label>
          <div class="fr">
            <button type="button" class="fbtn" id="eyeBtn" aria-label="Mostrar senha">
              <svg id="eyeSvg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="str-bar"><div class="str-fill" id="sf"></div></div>
          <p class="fmsg">Informe sua senha.</p>
        </div>

        <div class="forgot"><a href="#">Esqueceu a senha?</a></div>

        <button type="submit" class="btn" id="btnGo">
          <div class="bi">
            <div class="sp"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
<script src="./supabase.js" defer></script>
<script>
/* wordmark — subtle hover lift (max 8px, not 18px) */
const letters = [...document.querySelectorAll('.wl')];
function wave(idx) {
  letters.forEach((l, i) => {
    const d = Math.abs(idx - i);
    const y = [8, 4, 1, 0][Math.min(d, 3)];
    l.style.transform = `translateY(-${y}px)`;
  });
}
function unwave() { letters.forEach(l => l.style.transform = ''); }
letters.forEach((l, i) => {
  l.addEventListener('mouseenter', () => wave(i));
  l.addEventListener('mouseleave', unwave);
});

/* tagline — letters fade in one by one after the wordmark settles */
const btag = document.getElementById('btag');
const btagChars = [...btag.textContent];
btag.textContent = '';
btagChars.forEach((ch, i) => {
  const s = document.createElement('span');
  s.className = 'bl';
  s.textContent = ch === ' ' ? ' ' : ch;
  s.style.animationDelay = (0.62 + i * 0.018) + 's';
  btag.appendChild(s);
});

/* idle ripple — a little wave passes through "Shorti." every few seconds */
function autoWave() {
  let i = -1;
  const step = setInterval(() => {
    i++;
    if (i > letters.length + 1) { clearInterval(step); unwave(); return; }
    wave(i);
  }, 80);
}
setTimeout(autoWave, 2200);
setInterval(autoWave, 6000);

/* ring ripple on keypress */
function ring(el) {
  const r = document.createElement('div');
  r.className = 'ring';
  el.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

/* floating labels */
document.querySelectorAll('.field input').forEach(inp => {
  const s = () => inp.classList.toggle('v', inp.value.length > 0);
  inp.addEventListener('input', s);
  inp.addEventListener('blur', s);
  s();
});

/* email — live checkmark */
const emInp = document.getElementById('em');
const emOk  = document.getElementById('emok');
const fEm   = document.getElementById('f-em');
emInp.addEventListener('keydown', () => ring(fEm));
emInp.addEventListener('input', () => {
  const v = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emInp.value.trim());
  emOk.classList.toggle('on', v);
  if (v) fEm.classList.remove('e');
});

/* password — strength bar only (monochrome) */
const pwInp = document.getElementById('pw');
const sf    = document.getElementById('sf');
const fPw   = document.getElementById('f-pw');
pwInp.addEventListener('keydown', () => ring(fPw));
pwInp.addEventListener('input', () => {
  const val = pwInp.value, len = val.length;
  let score = 0;
  if (len >= 4)  score++;
  if (len >= 8)  score++;
  if (/[A-Z]/.test(val) || /[0-9]/.test(val)) score++;
  if (/[!@#$%^&*]/.test(val) && len >= 8) score++;

  if (len === 0) { sf.style.width = '0'; sf.style.opacity = '0'; return; }
  sf.style.opacity = '1';
  const widths = ['20%', '40%', '70%', '85%', '100%'];
  sf.style.width = widths[Math.min(score, 4)];
});

/* password toggle */
const eyeBtn = document.getElementById('eyeBtn');
const eyeSvg = document.getElementById('eyeSvg');
const EYE_OFF = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
const EYE_ON  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
eyeBtn.addEventListener('click', () => {
  const show = pwInp.type === 'password';
  pwInp.type = show ? 'text' : 'password';
  eyeSvg.innerHTML = show ? EYE_OFF : EYE_ON;
  eyeBtn.style.color = show ? 'var(--blue)' : '';
});

/* submit */
const btn = document.getElementById('btnGo');
const fa  = document.getElementById('fa');

function setErr(id, msg) {
  const f = document.getElementById(id);
  f.classList.add('e');
  if (msg) f.querySelector('.fmsg').textContent = msg;
}
function clr() {
  document.querySelectorAll('.field.e').forEach(f => f.classList.remove('e'));
  fa.style.display = 'none';
}

document.getElementById('lf').addEventListener('submit', async e => {
  e.preventDefault();
  clr();

  const email = emInp.value.trim();
  const pass  = pwInp.value;
  let ok = true;

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setErr('f-em', 'E-mail inválido.'); ok = false; }
  if (!pass) { setErr('f-pw', 'Informe sua senha.'); ok = false; }
  if (!ok) return;

  btn.disabled = true;
  btn.classList.add('ld');

  try {
    if (typeof SBAuth !== 'undefined') {
      await SBAuth.signIn(email, pass);
    }
    btn.style.background = '#059669';
    btn.style.boxShadow  = '0 2px 12px rgba(5,150,105,.22)';
    await new Promise(r => setTimeout(r, 700));
    window.location.href = 'erp.html';
  } catch (err) {
    btn.classList.remove('ld');
    btn.disabled = false;
    btn.style.background = '';
    btn.style.boxShadow  = '';
    const m = err?.message || '';
    fa.textContent = m.toLowerCase().includes('invalid') || m.toLowerCase().includes('credentials')
      ? 'Credenciais incorretas. Tente novamente.'
      : (m || 'Erro ao entrar. Tente novamente.');
    fa.style.display = 'block';
  }
});

/* PWA: registra o service worker (cache do app shell p/ instalação) */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
</script>
</body>
